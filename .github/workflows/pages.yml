name: Publish static site to Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate static catalog
        run: node scripts/validate-static-site.mjs
      - name: Validate generated Pages artifact
        run: |
          node scripts/prepare-pages-artifact.mjs
          grep -Fq 'empresas perto de mim' .pages-artifact/index.html
          grep -Fq 'ferramentas de IA' .pages-artifact/index.html
          grep -Fq 'href="servicos/"' .pages-artifact/index.html
          grep -Fq 'href="presenca-digital/"' .pages-artifact/index.html
          grep -Fq 'href="sobre/"' .pages-artifact/index.html
          grep -Fq 'href="privacidade/"' .pages-artifact/index.html
          test -f .pages-artifact/servicos/index.html
          test -f .pages-artifact/presenca-digital/index.html
          test -f .pages-artifact/sobre/index.html
          test -f .pages-artifact/privacidade/index.html
      - name: Validate Search Console verification artifact
        run: |
          printf '%s\n' 'google-site-verification: google-ci-verification.html' > google-ci-verification.html
          node scripts/prepare-pages-artifact.mjs
          test -f .pages-artifact/google-ci-verification.html
          grep -Fxq 'google-site-verification: google-ci-verification.html' .pages-artifact/google-ci-verification.html
          rm google-ci-verification.html

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Prepare allowlisted artifact
        run: node scripts/prepare-pages-artifact.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .pages-artifact
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
